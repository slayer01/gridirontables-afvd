name: Build Plugin ZIP

on:
  push:
    branches: ['*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        run: |
          VERSION=$(grep -oP "Version:\s+\K[0-9]+\.[0-9]+\.[0-9]+" afvd-data.php | head -1)
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Plugin version: ${VERSION}"

      - name: Build ZIP
        run: |
          mkdir -p afvd-data
          cp -r afvd-data.php uninstall.php README.md includes/ admin/ public/ afvd-data/
          zip -r afvd-data.zip afvd-data/

      - name: Create or update release
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" afvd-data.zip --clobber
          else
            gh release create "$TAG" afvd-data.zip \
              --title "AFVD Data ${VERSION}" \
              --notes "Release ${VERSION}" \
              --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
